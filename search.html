<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隠れ家｜検索</title>

    <link rel="stylesheet" href="css/headerStyle.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/searchStyle.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<div class="app">
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" type="button" aria-label="メニュー">
                <span class="menu-icon">☰</span>
                <span class="menu-text">メニュー</span>
            </button>
        </div>

        <div class="header-center">
            <a class="site-title-link" href="index.html" aria-label="ホームへ">隠れ家</a>
        </div>

        <div class="header-right">
            <button class="login-btn" type="button" aria-label="ログイン">
                <img src="images/loginImg.png" alt="" class="login-icon">
                <span class="login-text">ログイン</span>
            </button>
        </div>
    </header>

    <nav class="sidebar" aria-label="サイドメニュー">
        <a class="nav-item" href="index.html">
            <div class="nav-icon">🏠</div>
            <div class="nav-text">ホーム</div>
        </a>

        <a class="nav-item active" href="search.html">
            <div class="nav-icon">🔍</div>
            <div class="nav-text">検索</div>
        </a>

        <a class="nav-item" href="saved.html">
            <div class="nav-icon">⭐</div>
            <div class="nav-text">保存</div>
        </a>

        <a class="nav-item" href="about.html">
            <div class="nav-icon">🏮</div>
            <div class="nav-text">企業</div>
        </a>
    </nav>

    <main class="main">
        <div class="page search">

            <section class="search-hero">
                <h1 class="catch">条件で絞って、地図で見つける。</h1>
                <p class="lead">
                    タイプ・予算・期間・距離・地区で整理して、近くの小さなイベントを見つけます。
                </p>

                <div class="filters">
                    <div class="row">
                        <label class="field">
                            <span class="label">タイプ</span>
                            <select id="eventType" class="select">
                                <option value="">全て</option>
                                <option value="祭り">祭り</option>
                                <option value="朝市">朝市</option>
                                <option value="体験">体験</option>
                                <option value="展示">展示</option>
                            </select>
                        </label>

                        <label class="field">
                            <span class="label">予算</span>
                            <select id="budget" class="select">
                                <option value="">指定なし</option>
                                <option value="0">無料</option>
                                <option value="1000">~1000円</option>
                                <option value="3000">~3000円</option>
                                <option value="5000">~5000円</option>
                            </select>
                        </label>

                        <label class="field">
                            <span class="label">期間</span>
                            <select id="period" class="select">
                                <option value="">指定なし</option>
                                <option value="today">今日</option>
                                <option value="week">今週</option>
                                <option value="month">今月</option>
                                <option value="year">今年</option>
                                <option value="range">日付指定</option>
                            </select>
                        </label>

                        <div class="date-range" id="dateRange">
                            <label class="field">
                                <span class="label">開始</span>
                                <input id="dateFrom" type="date" class="date-input">
                            </label>

                            <div class="date-sep">〜</div>

                            <label class="field">
                                <span class="label">終了</span>
                                <input id="dateTo" type="date" class="date-input">
                            </label>
                        </div>

                        <label class="field">
                            <span class="label">距離</span>
                            <select id="distance" class="select">
                                <option value="">指定なし</option>
                                <option value="10">車で30分以内（目安10km）</option>
                                <option value="20">車で60分以内（目安20km）</option>
                                <option value="40">車で90分以内（目安40km）</option>
                            </select>
                        </label>

                        <label class="field">
                            <span class="label">地区</span>
                            <select id="area" class="select">
                                <option value="">指定なし</option>
                                <option value="神戸">神戸</option>
                                <option value="阪神">阪神</option>
                                <option value="播磨">播磨</option>
                                <option value="丹波">丹波</option>
                                <option value="但馬">但馬</option>
                                <option value="淡路">淡路</option>
                            </select>
                        </label>

                        <label class="field">
                            <span class="label">市</span>
                            <input id="city" type="text" class="text-input" placeholder="例：明石 / 姫路">
                        </label>

                        <button id="searchBtn" class="search-btn" type="button">検索</button>
                    </div>

                    <p id="locStatus" class="loc-status"></p>
                </div>
            </section>

            <section class="map-wrap">
                <div id="map"></div>
            </section>

            <section class="result">
                <div class="result-head">
                    <h2 class="result-title">見つかったイベント</h2>
                    <p id="resultCount" class="result-count">0件</p>
                </div>
                <div id="cards" class="cards"></div>
            </section>

        </div>
    </main>
</div>

<script src="js/events.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/search.js"></script>

</body>
</html>
